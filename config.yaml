portfolio:
  capital_nok: 20000
  max_positions: 2
  position_sizing: score_weighted
  max_position_pct: 0.50
  cash_reserve_pct: 0.05

risk:
  stop_loss_pct: 0.08
  take_profit_pct: 0.16
  min_score_for_buy: 75
  minimum_buy_score: 75

transaction_cost:
  fixed_nok: 29

primary_strategy:
  name: momentum_portfolio
  top_n: 2
  rebalance_frequency: monthly
  stop_loss_pct: 15
  momentum_threshold_pct: 10
  capital_nok: 30000

trading:
  min_trade_size_nok: 7500
  max_new_positions_per_rebalance: 1
  rebalance_frequency: monthly
  min_holding_days: 30
  min_score_for_buy: 82
  min_score_for_reentry: 88

backtest:
  history_period: 2y
  rebalance_frequency: monthly
  output_path: reports/backtest_report.md

news:
  enabled: true
  max_headlines_per_ticker: 3
  sentiment_enabled: true
  cache_path: data/news_cache.json
  output_path: reports/news_report.md

signals:
  sell_momentum_threshold: -0.08

report:
  schedule: daily
  output_path: reports/daily_report.md

market_data:
  watchlist_path: data/watchlist.csv
  history_months: 6
